name: CI/CD

on:
  push:
    branches: [main, dev, test]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gogo-demo:latest
            ghcr.io/${{ github.repository_owner }}/gogo-demo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Install Ansible
        run: pip install ansible

      # Env mapping: main → prod, dev → dev, test → test. Per-env: PROD/DEV/TEST_SERVER_IP, PROD/DEV/TEST_SSH_KEY.
      - name: Set env from branch
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "traefik_host=gogo-demo.opendays.cc" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "traefik_host=gogo-demo-dev.opendays.cc" >> $GITHUB_OUTPUT
          else
            echo "traefik_host=gogo-demo-test.opendays.cc" >> $GITHUB_OUTPUT
          fi

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_KEY || (github.ref == 'refs/heads/dev' && secrets.DEV_SSH_KEY || secrets.TEST_SSH_KEY) }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Write inventory
        run: |
          echo "${{ github.ref == 'refs/heads/main' && secrets.PROD_SERVER_IP || (github.ref == 'refs/heads/dev' && secrets.DEV_SERVER_IP || secrets.TEST_SERVER_IP) }}" > /tmp/inventory.yml

      - name: Write deploy playbook
        run: |
          cat > /tmp/deploy.yml << 'PLAYBOOK'
          - hosts: all
            become: true
            vars:
              deploy_dir: /opt/apps/gogo-demo
              docker_registry: ghcr.io
              app_image: "ghcr.io/{{ deploy_registry_user }}/gogo-demo:latest"
            tasks:
              - ansible.builtin.file:
                  path: "{{ deploy_dir }}"
                  state: directory
                  mode: "0755"
              - ansible.builtin.copy:
                  content: |
                    services:
                      app:
                        image: "{{ app_image }}"
                        environment:
                          - PORT=3000
                        ports:
                          - "3000:3000"
                        labels:
                          - "traefik.enable=true"
                          - "traefik.http.routers.gogo-demo.rule=Host(`${TRAEFIK_HOST}`)"
                          - "traefik.http.routers.gogo-demo.entrypoints=web"
                          - "traefik.http.services.gogo-demo.loadbalancer.server.port=3000"
                        deploy:
                          resources:
                            limits:
                              memory: 512M
                        networks:
                          - webgateway
                    networks:
                      webgateway:
                        external: true
                        name: traefik_webgateway
                  dest: "{{ deploy_dir }}/docker-compose.yml"
                  mode: "0644"
              - ansible.builtin.copy:
                  content: "TRAEFIK_HOST={{ traefik_host }}\n"
                  dest: "{{ deploy_dir }}/.env"
                  mode: "0644"
              - name: Login to registry
                ansible.builtin.command:
                  cmd: docker login ghcr.io -u {{ deploy_registry_user }} -p {{ deploy_registry_token }}
                no_log: true
              - ansible.builtin.shell:
                  cmd: docker compose pull && docker compose up -d
                  chdir: "{{ deploy_dir }}"
          PLAYBOOK

      - name: Run deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i /tmp/inventory.yml /tmp/deploy.yml \
            -e ansible_user=root \
            -e ansible_ssh_private_key_file=~/.ssh/id_rsa \
            -e deploy_registry_user=${{ github.repository_owner }} \
            -e deploy_registry_token=${{ secrets.DEPLOY_REGISTRY_TOKEN || secrets.GITHUB_TOKEN }} \
            -e traefik_host=${{ steps.env.outputs.traefik_host }}
